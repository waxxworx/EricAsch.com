<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eric Isaac Asch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #F5F0E8;
      --linen: #EDE6D6;
      --bark: #6B5B45;
      --moss: #4A5240;
      --earth: #8B7355;
      --ink: #1C1C1A;
      --fog: rgba(245, 240, 232, 0.07);
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background-color: var(--ink);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Subtle texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(107, 91, 69, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 100%, rgba(74, 82, 64, 0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
      max-width: 680px;
      width: 100%;
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      width: 220px;
      height: 220px;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeIn 2s ease 0.3s forwards;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* Invert black logo to cream for dark background */
      filter: invert(1) sepia(1) saturate(0.3) brightness(0.92);
      mix-blend-mode: screen;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--earth);
      margin: 0 auto 2.8rem;
      opacity: 0;
      animation: fadeIn 1.5s ease 0.8s forwards;
    }

    .hero-question {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      line-height: 1.35;
      letter-spacing: 0.01em;
      color: var(--cream);
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fadeIn 1.8s ease 1s forwards;
    }

    .subtext {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(0.95rem, 2.2vw, 1.1rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--earth);
      opacity: 0;
      animation: fadeIn 1.8s ease 1.5s forwards;
    }

    .contact {
      margin-top: 3.5rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 0.95rem;
      color: rgba(245, 240, 232, 0.38);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeIn 1.8s ease 2s forwards;
    }

    .contact a {
      color: rgba(245, 240, 232, 0.45);
      text-decoration: none;
      border-bottom: 1px solid rgba(139, 115, 85, 0.3);
      padding-bottom: 1px;
      transition: color 0.3s, border-color 0.3s;
    }

    .contact a:hover {
      color: var(--cream);
      border-color: var(--earth);
    }

    /* Thin decorative border */
    .frame {
      position: fixed;
      inset: 20px;
      border: 1px solid rgba(139, 115, 85, 0.15);
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      animation: fadeIn 2s ease 2.2s forwards;
    }

    @media (max-width: 480px) {
      .logo-wrap {
        width: 160px;
        height: 160px;
        margin-bottom: 2.2rem;
      }
      .frame {
        inset: 12px;
      }
    }
  </style>

</head>
<body>

  <div class="frame"></div>

  <div class="container">
    <div class="logo-wrap">
      <img src="nandi_1.jpeg" alt="Eric Isaac Asch">
    </div>
